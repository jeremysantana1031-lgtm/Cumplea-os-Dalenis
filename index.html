<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Feliz Cumpleaños, Dalenis!</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .tarjeta-cumpleanos {
            background-color: white;
            padding: 50px 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.15);
            text-align: center;
            max-width: 450px;
            margin: 20px;
        }
        h1 {
            color: #d81b60;
            margin-top: 0;
            margin-bottom: 20px;
            font-size: 2.2em;
        }
        p {
            color: #444;
            font-size: 1.2em;
            line-height: 1.6;
            margin-bottom: 25px;
        }
        .corazon {
            color: #e91e63;
            font-size: 4em;
            margin: 20px 0;
            display: inline-block;
            animation: latido 1.2s infinite;
        }
        .firma {
            margin-top: 20px;
            font-weight: bold;
            color: #d81b60;
            font-size: 1.3em;
        }
        
        /* Animación para que el corazón palpite */
        @keyframes latido {
            0% { transform: scale(1); }
            15% { transform: scale(1.2); }
            30% { transform: scale(1); }
            45% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <div class="tarjeta-cumpleanos">
        <h1>¡Feliz Cumpleaños, Dalenis! 🎂</h1>
        
        <div class="corazon">❤️</div>
        
        <p>Que este día sea tan increíble y especial como tú. Quería prepararte una sorpresa diferente y dejarte este mensaje en internet para que lo puedas ver siempre. ¡Espero que disfrutes muchísimo tu día!</p>
        
        <div class="firma">Con todo mi amor,<br>Jeremy</div>
    </div>

</body>
</html>
